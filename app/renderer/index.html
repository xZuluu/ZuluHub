<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
<title>ZuluHub</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#08090b;color:#f2f4f7;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
    height:100vh;display:flex;flex-direction:column}
  header{height:46px;display:flex;align-items:center;gap:10px;padding:0 16px;
    border-bottom:1px solid #1e222a;font-weight:600;letter-spacing:.02em}
  header .g{color:#5865F2;letter-spacing:-1px}
  main{flex:1;display:flex;min-height:0}
  nav{width:180px;border-right:1px solid #1e222a;padding:10px;display:flex;flex-direction:column;gap:2px}
  nav button{text-align:left;background:none;border:none;color:#9aa3b0;font:inherit;
    padding:8px 10px;border-radius:6px;cursor:pointer}
  nav button:hover,nav button.on{background:#181b21;color:#f2f4f7}
  section{flex:1;padding:16px;overflow:auto}
  #log{font-family:ui-monospace,monospace;font-size:12px;color:#9aa3b0;white-space:pre-wrap}
</style>
</head>
<body>
  <header><span class="g">◢◤</span> ZuluHub</header>
  <main>
    <nav>
      <button class="on" data-m="generate">Generator</button>
      <button data-m="clean">Cleaner</button>
      <button data-m="seek">Seeker</button>
    </nav>
    <section><div id="log"></div></section>
  </main>
  <script src="renderer.js"></script>
</body>
</html>
